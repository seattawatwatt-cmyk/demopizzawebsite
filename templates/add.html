{% extends 'base.html' %}
{% block title %}เพิ่มเมนูพิซซ่าใหม่ | PizzaHub{% endblock %}
{% block content %}
<div class="container">
    <div class="form-card">
        <h2><i class="fas fa-pizza-slice" style="color: #e63946; margin-right: 12px;"></i>เพิ่มเมนูพิซซ่าใหม่</h2>
        <form method="POST">
            <div class="form-group">
                <label for="name"><i class="fas fa-heading"></i> ชื่อพิซซ่า</label>
                <input id="name" class="form-control" type="text" name="name" placeholder="เช่น Pepperoni Supreme" required>
            </div>
            <div class="form-group">
                <label for="price"><i class="fas fa-dollar-sign"></i> ราคา (บาท)</label>
                <input id="price" class="form-control" type="number" step="0.01" name="price" placeholder="เช่น 299.00" required>
            </div>
            <div class="form-group">
                <label for="image"><i class="fas fa-image"></i> URL รูปภาพ</label>
                <input id="image" class="form-control" type="url" name="image" placeholder="https://i.pinimg.com/..." required>
            </div>
            <div class="form-group">
                <label for="stock"><i class="fas fa-box"></i> จำนวนสต็อก</label>
                <input id="stock" class="form-control" type="number" name="stock" value="0" min="0" required>
            </div>
            <div class="form-group">
                <label for="category_id"><i class="fas fa-list"></i> หมวดหมู่</label>
                <select id="category_id" class="form-select" name="category_id" required>
                    <option value="">-- เลือกหมวดหมู่ --</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">
                    <i class="fas fa-check-circle"></i> เพิ่มพิซซ่า
                </button>
                <a href="{{ url_for('index') }}" class="secondary-link">
                    <i class="fas fa-arrow-left"></i> กลับสู่หน้าแรก
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
